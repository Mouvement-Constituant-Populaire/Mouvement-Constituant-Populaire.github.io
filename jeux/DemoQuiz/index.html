<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Démocratie Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    
    <div class="theme-toggle">
      <span class="theme-label">Thème</span>
      <button id="themeSwitch" aria-pressed="false">🌓</button>
    </div>
  </header>

  <!-- ÉCRAN D’ACCUEIL -->
  <main id="home-screen" class="home-screen">
    <section class="home-card">

      <img src="img/Demo_Quiz_bleu.png" class="home-logo">

      <h1 class="home-title">Démocratie Quiz</h1>
      <p class="home-subtitle">Testez vos connaissances sur la démocratie</p>

      <p class="home-lead"><strong>Choisissez votre niveau (optionnel)</strong></p>

      <div class="levels">
        <button class="level-btn" data-level="facile">★ Facile</button>
        <button class="level-btn" data-level="intermediaire">★★ Intermédiaire</button>
        <button class="level-btn" data-level="expert">★★★ Expert</button>
      </div>

      <p class="home-info" id="selectedInfo">
        Vous pouvez choisir un niveau ou cliquer directement sur Commencer.
      </p>

      <button id="startBtn" class="start-btn">Commencer</button>
    
    </section>
  </main>
  <div  class= "footer">
      <a href="https://mouvement-constituant-populaire.fr">
        <img src="img/LogoPiedDePage.png" class="footer-logo" alt="Mouvement-Constituant-Populaire.fr">
      </a>
    </div>   

  <!-- ÉCRAN QUIZ -->
  <main id="quiz-screen" class="quiz-screen hidden">
    <div class="quiz-container">
      <section class="quiz-card">

        <div class="score-row">
          <div id="score"></div>
          <div id="remaining"></div>
        </div>

        <h2 id="question-text"></h2>

        <div id="answers" class="answers"></div>

        <button id="validate" class="btn" disabled>Valider</button>

        <p id="feedback" class="feedback"></p>
        <p id="definition" class="definition"></p>

        <button id="next" class="btn next" style="display:none;">Question suivante</button>

        <img src="img/Demo_Quiz_bleu.png" class="quiz-logo">
        
        <button id="returnHome" class="hidden">Retour à l'accueil</button>
      </section>
    </div>
    <div  class= "footer">
      <a href="https://mouvement-constituant-populaire.fr">
        <img src="img/LogoPiedDePage.png" class="footer-logo" alt="Mouvement-Constituant-Populaire.fr">
      </a>
    </div>    
    
  </main>
  


  <script src="script.js"></script>
</body>
</html>
